version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
    - gosec
    - gocritic
    - revive
    - misspell
  settings:
    govet:
      enable-all: true
    gosec:
      severity: medium
      confidence: medium
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
        - opinionated
      disabled-checks:
        - whyNoLint
    revive:
      severity: warning
      rules:
        - name: exported
          severity: warning
        - name: package-comments
          severity: warning
        - name: unused-parameter
        - name: indent-error-flow
        - name: error-return
        - name: error-naming
        - name: if-return
    misspell:
      locale: US
  exclusions:
    presets:
      - comments
      - common-false-positives
      - std-error-handling

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/Steve-s-Circle-on-System-Design/golang-rbac-system